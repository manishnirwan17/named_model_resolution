# insights_runner/quality_gate/thresholds.yaml
#
# All quality gate thresholds live here — no hard-coded values in Python.
# Adding checks for a new model: add a block with "checks" list + thresholds.
# The check names must match keys in CHECK_REGISTRY (assessor.py).

global:
  min_fill_rate: 0.80          # columns below this → WARN
  fail_fill_rate: 0.50         # columns below this → FAIL (unusable)
  zero_variance_cv: 0.01       # CV < this → column is near-constant → WARN
  min_row_count: 8             # hard floor (safety net only — real minimums are per-grain in model blocks)

BOCPD:
  candidate_window_years: 2    # slice to max_date - 2 years before running
  checks: [fill_rate, zero_variance, date_continuity, min_row_count]
  # Grain-aware minimum unique periods required (date_continuity check)
  min_periods:
    daily:     30              # ~1 month of active daily events (sparse CRM logs)
    weekly:     8              # 8 weeks
    monthly:   12              # 12 months
    quarterly:  4              # 4 quarters
    default:    8              # fallback when grain is undetected
  max_gap_weeks: 4             # tolerable gap in time series (in periods, grain-agnostic)

MMM:
  candidate_window_years: 1    # slice to max_date - 1 year before running
  checks: [fill_rate, zero_variance, channel_collinearity, min_row_count]
  collinearity_threshold: 0.85
  min_channel_count: 2         # need a mix of at least 2 channels
  min_rows: 100
  target_grain: "auto"         # "auto" keeps current grain; "monthly" resamples weekly → monthly

PSI:
  candidate_window_years: 1    # slice to max_date - 1 year before running
  checks: [fill_rate, zero_variance, segment_balance, min_row_count]
  max_imbalance_ratio: 10.0    # max(segment_size) / min(segment_size)
  min_segment_size: 30

ARIMA:
  candidate_window_years: 3    # slice to max_date - 3 years (needs 2 seasonal cycles)
  checks: [fill_rate, zero_variance, date_continuity, min_row_count, autocorrelation]
  # 2× BOCPD minimums — ARIMA needs two seasonal cycles to fit reliably
  min_periods:
    daily:    120              # ~4 months of daily data
    weekly:    16              # 16 weeks (~4 months)
    monthly:   24              # 24 months (2 years)
    quarterly:  8              # 8 quarters (2 years)
    default:   16
  min_acf_lag1: 0.10           # lag-1 autocorrelation must exceed this
