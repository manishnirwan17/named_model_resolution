  # ── HCP activity counts (hcp_monthly / territory_monthly) ──────────────────
  - total_touches           # total touchpoints per HCP/territory per period
  - f2f_calls               # count of f2f calls (not a channel — it measures volume)
  - virtual_calls           # count of virtual calls
  - email_touches           # count of email touches
  - active_days             # distinct active call days per period
  - channel_mix             # channel diversity / breadth count
  # ── CRM RTE engagement metrics ─────────────────────────────────────────────
  - rte_delivered           # delivered RTE messages count
  - rte_opened              # opened RTE count
  - rte_clicked             # clicked RTE count
  - days_since_previous_touch   # recency: days since last HCP touchpoint
  - num_of_additional_attendees # group call attendee count
  # ── Sales / order volume ───────────────────────────────────────────────────
  - total_adjusted_qty_sold # net quantity sold after returns (IC sales)
  - amount                  # transaction revenue/amount
  - wac                     # wholesale acquisition cost (price measure)
  - total_volume            # total drug volume (claims datasets)
  - non_hemodialysis_volume # non-HD patient drug volume
  - non_hemodialysis_claims # non-HD patient claim count
  # ── IC compensation / goals ────────────────────────────────────────────────
  - ic_vials                # incentive compensation vial count
  - eligible_vials          # IC eligible vials
  - ttd_vials               # total-to-date vials
  - baseline_vials          # baseline vial performance
  - volume_potential        # org/system estimated volume potential
  - goals                   # sales quota / goals (SAR_GOALS, KAM_GOALS)
  - points                  # IC points
  - orders                  # order count (ORG_ORDERS, SYSTEM_ORDERS)

