# Suffixes/prefixes used for key detection (checked against column name)
key_candidates_suffixes:
  - _sk
  - _id
  - _npi
  - _code
  - _key
  - _vid    # Veeva Object IDs: hcp_vid, hco_vid, system_vid, etc.

# Suffixes/prefixes that indicate a numeric index/rank — suppress date matching
numeric_indicator_suffixes:
  - _idx
  - _index
  - _num
  - _rank
  - _bin
  - _order
  - _seq

numeric_indicator_prefixes:
  - n_
  - num_

# Flag column patterns
flag_prefixes:
  - is_
  - has_

flag_suffixes:
  - _flag
  - _indicator
  - _ind
  - _yn               # yes/no binary flags (FIRST_ORDER_DATE_YN, FYTD_FLAG, etc.)

# Business logic hints for unclassified columns.
# Map the exact column name (or its normalized/lowercase form) to a free-text description.
# A matching hint gives a strong boost (+2.0) when scoring unclassified_metric candidates,
# making this column the preferred fallback measure for model runs.
#
# Example:
#   MYSTERY_METRIC: "net new prescriptions, always positive, weekly HCP-level aggregate"
#   engagement_score: "composite HCP engagement score 0-100"
business_hints: {}

